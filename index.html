<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DOC FIX – Protect New Zealand</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:"Inter",system-ui;background:#F7F6F3;color:#0F3B2E;margin:0}
    .topbar{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
    .brand-mark{font-family:"Poppins";font-weight:700;font-size:18px}
    .main{margin-top:64px;padding:20px}
    .card{background:#fff;border:1px solid #E3E0DA;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
    .form-label{font-weight:600;font-size:13px;margin-top:8px}
    input,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-top:6px}
    .btn-primary{background:#0A261C;color:#fff;padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
    .page{display:none}
    .page.active{display:block}
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand-mark">DOC FIX</div>
    <button class="btn-primary" onclick="showPage('report')">Report Issue</button>
  </div>

  <div class="main">
    <!-- HOME -->
    <section id="home" class="page active">
      <div class="card"><h2>Protect places worth keeping</h2><p>Submit a report in under 60 seconds — quick, simple, and built for the outdoors.</p></div>
    </section>

    <!-- REPORT -->
    <section id="report" class="page">
      <div class="card">
        <h2>Report an Issue</h2>
        <label class="form-label">Location</label>
        <input type="text" id="locationDisplayText" placeholder="Enter hut/campsite name">
        <label class="form-label">Track / route name</label>
        <input type="text" id="trackName">
        <label class="form-label">Exact spot</label>
        <input type="text" id="exactSpot">
        <label class="form-label">Issue type</label>
        <input type="text" id="issueType">
        <label class="form-label">Description</label>
        <textarea id="issueDescription"></textarea>
        <label class="form-label">Photo</label>
        <input type="file" id="issueImage" accept="image/*">
        <label class="form-label">Contact (optional)</label>
        <input type="email" id="contactEmail" placeholder="Email">
        <input type="text" id="contactPhone" placeholder="Phone">
        <button class="btn-primary" onclick="submitReport()">Submit</button>
      </div>
    </section>
  </div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// full huts + campsites dataset
const huts = [
  "A Frame Hut","Abrahams Bay Hunters Hut","Ada Pass Hut","Adelaide Tarn Hut","Ahaura Hut",
  /* ... all other hut names ... */
  "Young Hut","Young River Hut"
];

const campsites = [
  "Acheron Accommodation House Campsite","Ahuriri Bridge Campsite","Akapoua Bay Campsite",
  /* ... all other campsite names ... */
  "Woolshed Creek Campsite","Young River Campsite"
];

// --- Corrected submitReport: sends separate emails and photo upload works ---
function submitReport(){
  const location = document.getElementById("locationDisplayText").value;
  const track = document.getElementById("trackName").value;
  const exact = document.getElementById("exactSpot").value;
  const issue = document.getElementById("issueType").value;
  const description = document.getElementById("issueDescription").value;
  const email = document.getElementById("contactEmail").value;
  const phone = document.getElementById("contactPhone").value;
  const file = document.getElementById("issueImage");

  function sendForm(subject, fields){
    const form=document.createElement("form");
    form.method="POST";
    form.action="https://formsubmit.co/YOUR_EMAIL_ADDRESS"; // replace with your actual email
    form.enctype="multipart/form-data";
    form.style.display="none";
    const hidden=(n,v)=>{const i=document.createElement("input");i.type="hidden";i.name=n;i.value=v||"";form.appendChild(i)};
    hidden("_subject",subject);
    hidden("_template","table");
    hidden("_captcha","true");
    Object.entries(fields).forEach(([k,v])=>hidden(k,v));
    document.body.appendChild(form);
    form.submit();
  }

  // send separate emails
  sendForm("DOC FIX – Location",{Location:location,Track:track,ExactSpot:exact});
  sendForm("DOC FIX – Issue",{IssueType:issue,Description:description});
  sendForm("DOC FIX – Contact",{Email:email,Phone:phone});

  if(file.files.length>0){
    const form=document.createElement("form");
    form.method="POST";
    form.action="https://formsubmit.co/YOUR_EMAIL_ADDRESS";
    form.enctype="multipart/form-data";
    form.style.display="none";

    const upload=document.createElement("input");
    upload.type="file";
    upload.name="Photo";
    const dt=new DataTransfer();
    dt.items.add(file.files[0]);
    upload.files=dt.files;
    form.appendChild(upload);

    document.body.appendChild(form);
    form.submit();
  }
}
</script>
</body>
</html>
